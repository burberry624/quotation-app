<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷達牧場 - 雞肉批發報價系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --brand-color: #2D5A27; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f9fafb; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .text-brand { color: var(--brand-color); }
        .bg-brand { background-color: var(--brand-color); }
        
        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; -webkit-print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-container { width: 100%; margin: 0; padding: 15mm; box-shadow: none; }
            table, th, td { border-color: black !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const IconPlus = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"/></svg>;
        const IconSync = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>;
        const IconClose = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>;

        const App = () => {
            const [mode, setMode] = useState('edit');
            const [isSyncing, setIsSyncing] = useState(false);
            
            const [headerInfo, setHeaderInfo] = useState({
                clientName: '', 
                clientPhone: '', 
                date: new Date().toISOString().split('T')[0],
                companyName: '雷達牧場', 
                footerNote: '1. 重量以實際過秤為準。\n2. 貨到請當面點交，簽收後概不負責。'
            });

            const [items, setItems] = useState([
                { id: 1, name: '黑羽土雞', qty: 0, totalW: 0, tareW: 0, price: 0, note: '' }
            ]);

            const getNetW = (item) => Math.max(0, (Number(item.totalW) || 0) - (Number(item.tareW) || 0)).toFixed(2);
            const getAmount = (item) => Math.round(getNetW(item) * (Number(item.price) || 0));
            const calculateTotal = () => items.reduce((sum, item) => sum + getAmount(item), 0);

            const syncToSheet = async () => {
                const gasUrl = "https://script.google.com/macros/library/d/1xS1GNCz04YZn1bL7olrEYQfGooI2rxMAzaX7S--0kOJcbD_9EuMMqSU7/1"; 
                if (gasUrl === "https://script.google.com/macros/library/d/1xS1GNCz04YZn1bL7olrEYQfGooI2rxMAzaX7S--0kOJcbD_9EuMMqSU7/1") return alert("請先填入您的 Google GAS 網址");
                
                setIsSyncing(true);
                try {
                    await fetch(gasUrl, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({
                            date: headerInfo.date,
                            client: headerInfo.clientName,
                            phone: headerInfo.clientPhone,
                            total: calculateTotal(),
                            items: items.map(i => ({ name: i.name, qty: i.qty, net: getNetW(i), price: i.price, subtotal: getAmount(i) }))
                        })
                    });
                    alert("同步成功！");
                } catch (e) { alert("同步失敗"); }
                finally { setIsSyncing(false); }
            };

            const renderEdit = () => (
                <div className="max-w-2xl mx-auto p-4 pb-40">
                    <div className="text-center mb-8 pt-4">
                        <h1 className="text-2xl font-black text-brand tracking-wider">雷達牧場雞肉批發報價系統</h1>
                        <p className="text-gray-400 text-xs font-bold mt-1 uppercase">Professional Edition</p>
                    </div>
                    
                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-6 space-y-4">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label className="text-sm font-black text-black block mb-1">客戶名稱</label>
                                <input value={headerInfo.clientName} onChange={e => setHeaderInfo({...headerInfo, clientName: e.target.value})} className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-green-500 font-bold" placeholder="請輸入姓名" />
                            </div>
                            <div>
                                <label className="text-sm font-black text-black block mb-1">客戶電話</label>
                                <input value={headerInfo.clientPhone} onChange={e => setHeaderInfo({...headerInfo, clientPhone: e.target.value})} className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-green-500 font-bold" placeholder="請輸入電話" />
                            </div>
                            <div>
                                <label className="text-sm font-black text-black block mb-1">出貨日期</label>
                                <input type="date" value={headerInfo.date} onChange={e => setHeaderInfo({...headerInfo, date: e.target.value})} className="w-full p-3 bg-gray-50 rounded-xl outline-none font-bold" />
                            </div>
                        </div>
                    </div>

                    <div className="space-y-4">
                        {items.map((item) => (
                            <div key={item.id} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 relative transition-all hover:border-green-200">
                                <button onClick={()=>setItems(items.filter(i=>i.id!==item.id))} className="absolute -right-2 -top-2 bg-white rounded-full p-1 text-gray-300 hover:text-red-500 shadow border"><IconClose /></button>
                                
                                <input value={item.name} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, name: e.target.value} : i))} className="w-full text-xl font-black text-gray-800 bg-transparent border-b-2 border-gray-100 outline-none focus:border-green-500 mb-4 pb-1" placeholder="品項名稱" />

                                <div className="grid grid-cols-4 gap-2">
                                    <div className="bg-gray-50 p-2 rounded-xl border border-gray-100">
                                        <label className="text-xs font-black text-black block text-center mb-1">數量/籠</label>
                                        <input type="number" value={item.qty} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, qty: e.target.value} : i))} className="w-full text-center bg-transparent font-black text-lg" />
                                    </div>
                                    <div className="bg-gray-50 p-2 rounded-xl border border-gray-100">
                                        <label className="text-xs font-black text-black block text-center mb-1">總重/斤</label>
                                        <input type="number" value={item.totalW} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, totalW: e.target.value} : i))} className="w-full text-center bg-transparent font-black text-lg" />
                                    </div>
                                    <div className="bg-gray-50 p-2 rounded-xl border border-gray-100">
                                        <label className="text-xs font-black text-black block text-center mb-1">空重/斤</label>
                                        <input type="number" value={item.tareW} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, tareW: e.target.value} : i))} className="w-full text-center bg-transparent font-black text-lg text-gray-600" />
                                    </div>
                                    <div className="bg-green-50 p-2 rounded-xl border border-green-100">
                                        <label className="text-xs font-black text-brand block text-center mb-1 uppercase">單價/元</label>
                                        <input type="number" value={item.price} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, price: e.target.value} : i))} className="w-full text-center bg-transparent text-brand font-black text-xl" />
                                    </div>
                                </div>
                                
                                <div className="mt-4">
                                    <input value={item.note} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, note: e.target.value} : i))} className="w-full text-sm text-gray-500 bg-gray-50/80 p-2 rounded-xl italic outline-none border border-transparent focus:border-gray-200" placeholder="項目備註 (如：特別處理...)" />
                                </div>

                                <div className="mt-4 flex justify-between items-center pt-3 border-t border-dashed border-gray-200">
                                    <span className="text-sm font-bold text-black">淨重：<b className="text-xl text-black font-black">{getNetW(item)} 斤</b></span>
                                    <span className="text-brand font-black text-2xl">${getAmount(item).toLocaleString()}</span>
                                </div>
                            </div>
                        ))}
                    </div>

                    <button onClick={() => setItems([...items, { id: Date.now(), name: '', qty: 0, totalW: 0, tareW: 0, price: 0, note: '' }])} className="w-full py-4 mt-8 border-2 border-dashed border-black/20 rounded-3xl text-black font-black hover:bg-white hover:border-brand hover:text-brand transition-all flex items-center justify-center gap-2">
                        <IconPlus /> 新增品項
                    </button>

                    <div className="mt-10 bg-white p-5 rounded-3xl border border-gray-100">
                        <label className="text-sm font-black text-black block mb-2 px-1">備註 / 條款</label>
                        <textarea value={headerInfo.footerNote} onChange={e => setHeaderInfo({...headerInfo, footerNote: e.target.value})} rows="3" className="w-full p-4 bg-gray-50 rounded-2xl text-sm outline-none font-medium text-gray-700" />
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t-2 border-gray-100 p-5 z-50">
                        <div className="max-w-2xl mx-auto flex items-center justify-between">
                            <div>
                                <span className="text-sm font-black text-black block mb-1">總計金額</span>
                                <span className="text-4xl font-black text-black tracking-tighter">${calculateTotal().toLocaleString()}</span>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={syncToSheet} className={`p-4 rounded-2xl border-2 border-gray-100 hover:bg-gray-50 transition ${isSyncing ? 'animate-spin' : ''}`}><IconSync /></button>
                                <button onClick={() => setMode('preview')} className="bg-brand text-white px-10 py-4 rounded-2xl font-black text-lg shadow-xl shadow-green-900/20 hover:scale-105 transition active:scale-95">完成報價</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderPreview = () => (
                <div className="min-h-screen bg-gray-800 pb-10">
                    <div className="no-print p-4 flex justify-between max-w-[210mm] mx-auto text-white">
                        <button onClick={() => setMode('edit')} className="font-bold opacity-70 hover:opacity-100">← 返回編輯畫面</button>
                        <button onClick={() => window.print()} className="bg-brand px-8 py-2 rounded-full font-black">列印出貨單 / 存為 PDF</button>
                    </div>
                    
                    <div className="print-container w-[210mm] min-h-[297mm] mx-auto bg-white p-[20mm] relative serif shadow-2xl">
                        <div className="text-center border-b-4 border-brand pb-6 mb-8">
                            <h1 className="text-4xl font-black text-brand tracking-[0.2em] mb-2">{headerInfo.companyName}</h1>
                            <p className="text-sm font-bold tracking-[0.5em] text-gray-500 uppercase">雞肉批發報價單</p>
                            <div className="mt-8 flex justify-between text-sm px-2">
                                <div className="text-left space-y-2">
                                    <p>客戶名稱：<span className="font-black border-b-2 border-black px-4">{headerInfo.clientName}</span></p>
                                    <p>客戶電話：<span className="font-black border-b-2 border-black px-4">{headerInfo.clientPhone}</span></p>
                                </div>
                                <div className="text-right flex flex-col justify-end">
                                    <p className="font-bold text-gray-600 font-sans">出貨日期：{headerInfo.date}</p>
                                </div>
                            </div>
                        </div>

                        <table className="w-full border-collapse border-2 border-black mb-8 text-sm">
                            <thead>
                                <tr className="bg-gray-100">
                                    <th className="border-2 border-black p-2 w-10">#</th>
                                    <th className="border-2 border-black p-2 text-left">品項描述</th>
                                    <th className="border-2 border-black p-2 w-20">數量/籠</th>
                                    <th className="border-2 border-black p-2 w-20">總重/斤</th>
                                    <th className="border-2 border-black p-2 w-20">空重/斤</th>
                                    <th className="border-2 border-black p-2 w-20 text-brand">淨重/斤</th>
                                    <th className="border-2 border-black p-2 w-24 text-right">單價/元</th>
                                    <th className="border-2 border-black p-2 w-28 text-right font-black">小計</th>
                                </tr>
                            </thead>
                            <tbody>
                                {items.map((item, idx) => (
                                    <tr key={idx}>
                                        <td className="border border-black p-3 text-center font-bold">{idx + 1}</td>
                                        <td className="border border-black p-3">
                                            <div className="font-black text-base">{item.name}</div>
                                            {item.note && <div className="text-xs text-gray-500 italic mt-1 font-sans">※ {item.note}</div>}
                                        </td>
                                        <td className="border border-black p-3 text-center font-bold text-base">{item.qty}</td>
                                        <td className="border border-black p-3 text-center font-bold text-base">{item.totalW}</td>
                                        <td className="border border-black p-3 text-center font-bold text-base">{item.tareW}</td>
                                        <td className="border border-black p-3 text-center font-black text-lg text-brand">{getNetW(item)}</td>
                                        <td className="border border-black p-3 text-right font-bold text-base">{item.price}</td>
                                        <td className="border border-black p-3 text-right font-black text-lg">${getAmount(item).toLocaleString()}</td>
                                    </tr>
                                ))}
                                {Array.from({ length: Math.max(0, 8 - items.length) }).map((_, i) => (
                                    <tr key={i} className="h-10"><td className="border border-black"></td><td className="border border-black"></td><td className="border border-black"></td><td className="border border-black"></td><td className="border border-black"></td><td className="border border-black"></td><td className="border border-black"></td><td className="border border-black"></td></tr>
                                ))}
                            </tbody>
                        </table>

                        <div className="flex justify-end mb-12">
                            <div className="bg-brand text-white p-6 rounded-bl-3xl text-right min-w-[280px] shadow-lg">
                                <span className="text-xs opacity-80 block mb-1 font-sans">TOTAL AMOUNT (TWD)</span>
                                <span className="text-4xl font-black tracking-tighter">${calculateTotal().toLocaleString()}</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 gap-8 mt-10">
                            <div className="border-2 border-black p-4 text-sm min-h-[100px]">
                                <p className="font-black mb-2 underline italic">備註 / 條款：</p>
                                <div className="whitespace-pre-wrap leading-relaxed font-sans">{headerInfo.footerNote}</div>
                            </div>
                            <div className="flex justify-between mt-16 px-10">
                                <div className="w-1/3 border-t-2 border-black pt-2 text-center text-sm font-black">客戶簽認</div>
                                <div className="w-1/3 border-t-2 border-black pt-2 text-center text-sm font-black">雷達牧場 簽章</div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return mode === 'edit' ? renderEdit() : renderPreview();
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
