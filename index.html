<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷達牧場 - 數位報價系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@400;700&display=swap');
        
        :root {
            /* 您可以根據 LOGO 顏色修改下方的色碼 */
            --brand-color: #2D5A27; /* 預設為牧場深綠色 */
            --brand-light: #F0F7EF;
        }

        body { font-family: 'Noto Sans TC', sans-serif; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .bg-brand { background-color: var(--brand-color); }
        .text-brand { color: var(--brand-color); }
        .border-brand { border-color: var(--brand-color); }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; -webkit-print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-container { width: 100%; margin: 0; padding: 15mm; box-shadow: none; }
            table, th, td { border-color: black !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconPlus = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"/></svg>;
        const IconSync = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>;

        const App = () => {
            const [mode, setMode] = useState('edit');
            const [isSyncing, setIsSyncing] = useState(false);
            const [logo, setLogo] = useState(localStorage.getItem("radar_logo") || "");
            
            const [headerInfo, setHeaderInfo] = useState({
                clientName: '', 
                phone: '', 
                date: new Date().toISOString().split('T')[0],
                companyName: '雷達牧場', 
                companyPhone: '請輸入電話',
                footerNote: '1. 重量以實際過秤為準。\n2. 每日行情波動，報價僅限當日有效。'
            });

            const [items, setItems] = useState([
                { id: 1, name: '黑羽土雞', totalW: 0, tareW: 0, price: 0, note: '' }
            ]);

            const getNetW = (item) => Math.max(0, (Number(item.totalW) || 0) - (Number(item.tareW) || 0)).toFixed(2);
            const getAmount = (item) => Math.round(getNetW(item) * (Number(item.price) || 0));
            const calculateTotal = () => items.reduce((sum, item) => sum + getAmount(item), 0);
            
            const handleLogoChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        setLogo(reader.result);
                        localStorage.setItem("radar_logo", reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            // 串接 Google 試算表
            const syncToSheet = async () => {
                const gasUrl = "https://script.google.com/macros/s/AKfycbwTqsrRKi-0Nby52jD1jVV7SHe9s827Lhqy_aHp2m6fVkex-skXAMNGC5rlfhfIu4D9/exec"; // 請依照下方教學替換此網址
                if (gasUrl === "https://script.google.com/macros/s/AKfycbwTqsrRKi-0Nby52jD1jVV7SHe9s827Lhqy_aHp2m6fVkex-skXAMNGC5rlfhfIu4D9/exec") {
                    alert("請先完成下方說明的 GAS 部署設定。");
                    return;
                }

                setIsSyncing(true);
                const payload = {
                    date: headerInfo.date,
                    client: headerInfo.clientName,
                    total: calculateTotal(),
                    items: items.map(i => ({ name: i.name, net: getNetW(i), price: i.price, subtotal: getAmount(i) }))
                };

                try {
                    await fetch(gasUrl, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    alert("資料已同步至雷達牧場試算表！");
                } catch (e) {
                    alert("同步失敗，請檢查網路或 GAS 設定。");
                } finally {
                    setIsSyncing(false);
                }
            };

            const renderEdit = () => (
                <div className="max-w-2xl mx-auto p-4 pb-28">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-black text-brand tracking-tighter">雷達牧場 <span className="text-gray-400 font-light text-sm">數位管理系統</span></h1>
                        <label className="cursor-pointer bg-white px-3 py-1.5 rounded-full shadow-sm border text-xs hover:bg-gray-50 transition">
                            {logo ? '更換 LOGO' : '上傳 LOGO'}
                            <input type="file" className="hidden" onChange={handleLogoChange} />
                        </label>
                    </div>
                    
                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-6 space-y-4">
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="text-xs font-bold text-gray-400 block mb-1">客戶名稱</label>
                                <input value={headerInfo.clientName} onChange={e => setHeaderInfo({...headerInfo, clientName: e.target.value})} className="w-full p-3 bg-gray-50 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="客戶姓名" />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-gray-400 block mb-1">日期</label>
                                <input type="date" value={headerInfo.date} onChange={e => setHeaderInfo({...headerInfo, date: e.target.value})} className="w-full p-3 bg-gray-50 rounded-xl outline-none" />
                            </div>
                        </div>
                    </div>

                    <div className="space-y-4">
                        {items.map((item, idx) => (
                            <div key={item.id} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 transition hover:border-green-200">
                                <input value={item.name} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, name: e.target.value} : i))} className="w-full text-lg font-bold text-gray-700 bg-transparent border-b border-gray-100 pb-2 mb-4 outline-none focus:border-green-500" />
                                <div className="grid grid-cols-3 gap-3">
                                    <div className="bg-gray-50 p-2 rounded-2xl">
                                        <label className="text-[10px] text-gray-400 block text-center uppercase">Total W (總重)</label>
                                        <input type="number" value={item.totalW} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, totalW: e.target.value} : i))} className="w-full text-center bg-transparent font-bold" />
                                    </div>
                                    <div className="bg-gray-50 p-2 rounded-2xl">
                                        <label className="text-[10px] text-gray-400 block text-center uppercase">Tare W (空重)</label>
                                        <input type="number" value={item.tareW} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, tareW: e.target.value} : i))} className="w-full text-center bg-transparent" />
                                    </div>
                                    <div className="bg-brand/10 p-2 rounded-2xl border border-brand/20">
                                        <label className="text-[10px] text-brand block text-center uppercase font-bold">Price (單價)</label>
                                        <input type="number" value={item.price} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, price: e.target.value} : i))} className="w-full text-center bg-transparent text-brand font-black" />
                                    </div>
                                </div>
                                <div className="mt-4 flex justify-between items-end">
                                    <div className="text-sm text-gray-400">淨重：<span className="text-gray-800 font-bold">{getNetW(item)}</span> kg</div>
                                    <div className="text-xl font-black text-brand">${getAmount(item).toLocaleString()}</div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <button onClick={() => setItems([...items, { id: Date.now(), name: '', totalW: 0, tareW: 0, price: 0 }])} className="w-full py-4 mt-6 border-2 border-dashed border-gray-200 rounded-3xl text-gray-400 font-bold hover:bg-white hover:text-brand hover:border-brand transition-all flex items-center justify-center gap-2">
                        <IconPlus /> 新增品項
                    </button>

                    <div className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-4 z-50">
                        <div className="max-w-2xl mx-auto flex items-center justify-between">
                            <div>
                                <span className="text-xs text-gray-400 block">雷達牧場 總計</span>
                                <span className="text-2xl font-black text-brand">${calculateTotal().toLocaleString()}</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={syncToSheet} disabled={isSyncing} className={`p-3 rounded-2xl border border-gray-200 hover:bg-gray-50 transition ${isSyncing ? 'animate-spin opacity-50' : ''}`}>
                                    <IconSync />
                                </button>
                                <button onClick={() => setMode('preview')} className="bg-brand text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-green-900/20 hover:scale-105 transition active:scale-95">
                                    產生報價單
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderPreview = () => (
                <div className="min-h-screen bg-gray-800 pb-10">
                    <div className="no-print p-4 flex justify-between max-w-[210mm] mx-auto text-white">
                        <button onClick={() => setMode('edit')} className="opacity-70 hover:opacity-100">← 返回雷達牧場系統</button>
                        <button onClick={() => window.print()} className="bg-brand px-6 py-2 rounded-full font-bold">列印 / 存為 PDF</button>
                    </div>
                    <div className="print-container w-[210mm] min-h-[297mm] mx-auto bg-white p-[20mm] relative serif shadow-2xl">
                        <div className="flex justify-between items-start border-b-4 border-brand pb-6 mb-8">
                            <div>
                                <h1 className="text-4xl font-bold text-brand tracking-[0.2em] mb-2">雷達牧場 - 出貨單</h1>
                                <p className="text-sm">客戶：{headerInfo.clientName}</p>
                                <p className="text-sm">日期：{headerInfo.date}</p>
                            </div>
                            {logo && <img src={logo} className="max-h-24 max-w-[200px] object-contain" />}
                        </div>

                        <table className="w-full border-collapse mb-10">
                            <thead>
                                <tr className="bg-brand text-white">
                                    <th className="p-3 text-left">品項名稱</th>
                                    <th className="p-3">總重</th>
                                    <th className="p-3">空重</th>
                                    <th className="p-3">淨重</th>
                                    <th className="p-3 text-right">單價</th>
                                    <th className="p-3 text-right">小計</th>
                                </tr>
                            </thead>
                            <tbody className="text-sm">
                                {items.map((item, idx) => (
                                    <tr key={idx} className="border-b border-gray-100">
                                        <td className="p-3 font-bold">{item.name}</td>
                                        <td className="p-3 text-center">{item.totalW}</td>
                                        <td className="p-3 text-center">{item.tareW}</td>
                                        <td className="p-3 text-center font-bold">{getNetW(item)}</td>
                                        <td className="p-3 text-right">{item.price}</td>
                                        <td className="p-3 text-right font-bold">${getAmount(item).toLocaleString()}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>

                        <div className="flex justify-end mb-12">
                            <div className="bg-brand text-white p-6 rounded-br-3xl text-right min-w-[200px]">
                                <span className="text-xs opacity-80 block mb-1 uppercase">Total Amount</span>
                                <span className="text-3xl font-black">${calculateTotal().toLocaleString()}</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-10 mt-20 px-4">
                            <div className="border-t border-gray-400 pt-2 text-center text-sm font-bold">客戶簽認 (簽名)</div>
                            <div className="border-t border-gray-400 pt-2 text-center text-sm font-bold">雷達牧場 蓋章</div>
                        </div>
                    </div>
                </div>
            );

            return mode === 'edit' ? renderEdit() : renderPreview();
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
