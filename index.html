<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷達牧場 - 雞肉批發報價系統 (V16)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --brand-color: #2D5A27; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f9fafb; }
        .serif      { font-family: 'Noto Serif TC', serif; }
        .text-brand { color: var(--brand-color); }
        .bg-brand   { background-color: var(--brand-color); }

        /* ── 品項下拉搜尋 ── */
        .item-dropdown-wrap { position: relative; }
        .item-dropdown-list {
            position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
            background: white; border: 2px solid #d1fae5;
            border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            max-height: 220px; overflow-y: auto; margin-top: 4px;
        }
        .item-dropdown-list li {
            padding: 10px 16px; cursor: pointer; font-weight: 700;
            transition: background 0.15s;
        }
        .item-dropdown-list li:hover { background: #d1fae5; color: #2D5A27; }

        /* ── 報價單固定欄寬 ── */
        .col-seq    { width: 28px;  }
        .col-name   { width: 110px; }
        .col-qty    { width: 56px;  }
        .col-totalw { width: 62px;  }
        .col-tarew  { width: 62px;  }
        .col-net    { width: 75px;  }
        .col-price  { width: 55px;  }
        .col-sub    { width: 83px;  }

        /* ── 總計金額框（粗框線、無底色） ── */
        .total-box {
            border: 3px solid black;
            padding: 14px 22px;
            text-align: right;
            display: inline-block;
            min-width: 260px;
        }

        /* ── 帳務狀態左側直書文字 ── */
        .account-sidebar {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            letter-spacing: 0.25em;
            font-weight: 900;
            font-size: 0.85rem;
            padding: 8px 4px;
            border-right: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            min-width: 32px;
        }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-container { width: 100% !important; margin: 0 !important; padding: 13mm !important; box-shadow: none !important; }
            table, th, td { border-color: black !important; }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ═══════════════════════════════════════════════════
    // ⚙️  設定區：請填入你的 GAS 網址
    // ═══════════════════════════════════════════════════
    const GAS_URL = "https://script.google.com/macros/s/AKfycbweA_4cGkP5__LOfLLgZRK7qtSEwr5uzshAKloJkgQtmnQy0POS-sYMkpvD-j3RYTCx/exec";
    // ═══════════════════════════════════════════════════

    // ── 下拉品項清單 ──
    const PRODUCT_LIST = [
        "黑羽土雞(公)", "黑羽土雞(母)",
        "古早雞(公)",   "古早雞(母)",
        "紅羽土雞(公)", "紅羽土雞(母)",
        "烏骨雞(公)",   "烏骨雞(母)",
        "番鴨(公)",     "番鴨(母)",
        "鵝(公)",       "鵝(母)",
    ];

    // ── 報價單號：RD2026040301（日期+兩位流水號）──
    const getNextQuoteNo = (date) => {
        const key = "radar_quoteSeq_" + date;
        const seq = (parseInt(localStorage.getItem(key) || "0", 10)) + 1;
        localStorage.setItem(key, String(seq));
        return `RD${date.replace(/-/g, "")}${String(seq).padStart(2, "0")}`;
    };
    const peekQuoteNo = (date) => {
        const seq = parseInt(localStorage.getItem("radar_quoteSeq_" + date) || "0", 10) + 1;
        return `RD${date.replace(/-/g, "")}${String(seq).padStart(2, "0")}`;
    };

    const IconPlus  = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"/></svg>;
    const IconSync  = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>;
    const IconClose = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>;
    const IconTrash = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>;
    const IconCheck = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"/></svg>;

    const DEFAULT_HEADER = {
        clientName: '', clientPhone: '', clientAddress: '',
        date: new Date().toISOString().split('T')[0],
        companyName: '雷達牧場',
        footerNote: '1. 重量以實際過秤為準。\n2. 貨到請當面點交，簽收後概不負責。',
        accountStatus: '',
    };

    const sanitizeNumber = (val) => String(val).replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');
    const safeNum   = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
    const getNetW   = (item) => Math.max(0, safeNum(item.totalW) - safeNum(item.tareW)).toFixed(2);
    const getAmount = (item) => Math.round(parseFloat(getNetW(item)) * safeNum(item.price));

    const safeSetItem = (key, value) => {
        try { localStorage.setItem(key, JSON.stringify(value)); }
        catch (e) { alert('⚠️ 儲存失敗！瀏覽器儲存空間可能已滿。'); }
    };
    const safeGetItem = (key, fallback) => {
        try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : fallback; }
        catch (e) { return fallback; }
    };

    const newItem = () => ({ id: crypto.randomUUID(), name: '', qty: '', totalW: '', tareW: '', price: '', note: '' });

    // ── 品項下拉搜尋元件 ──
    const ProductInput = ({ value, onChange }) => {
        const [open, setOpen]   = useState(false);
        const [query, setQuery] = useState(value);
        const wrapRef           = useRef(null);

        useEffect(() => { setQuery(value); }, [value]);
        useEffect(() => {
            const handler = (e) => {
                if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
            };
            document.addEventListener('mousedown', handler);
            return () => document.removeEventListener('mousedown', handler);
        }, []);

        const filtered = query.trim() === ''
            ? PRODUCT_LIST
            : PRODUCT_LIST.filter(p => p.toLowerCase().includes(query.toLowerCase()));

        const select = (name) => { setQuery(name); onChange(name); setOpen(false); };

        return (
            <div className="item-dropdown-wrap" ref={wrapRef}>
                <input
                    value={query}
                    onChange={e => { setQuery(e.target.value); onChange(e.target.value); setOpen(true); }}
                    onFocus={() => setOpen(true)}
                    className="w-full text-xl font-black text-gray-800 bg-transparent border-b-2 border-gray-100 outline-none focus:border-green-500 mb-1 pb-1"
                    placeholder="品項名稱（點擊展開清單或輸入關鍵字搜尋）"
                />
                {open && filtered.length > 0 && (
                    <ul className="item-dropdown-list">
                        {filtered.map(p => (
                            <li key={p} onMouseDown={() => select(p)}>{p}</li>
                        ))}
                    </ul>
                )}
            </div>
        );
    };

    // ════════════════════════════════════════
    //  主元件
    // ════════════════════════════════════════
    const App = () => {
        const [mode, setMode]             = useState('edit');
        const [syncStatus, setSyncStatus] = useState('idle');
        const [syncMsg, setSyncMsg]       = useState('');
        const [quoteNo, setQuoteNo]       = useState('');
        const [headerInfo, setHeaderInfo] = useState(() => safeGetItem('radar_header', DEFAULT_HEADER));
        const [items, setItems]           = useState(() => {
            const saved = safeGetItem('radar_items', null);
            if (saved && Array.isArray(saved) && saved.length > 0) return saved;
            return [newItem()];
        });

        useEffect(() => {
            safeSetItem('radar_header', headerInfo);
            safeSetItem('radar_items', items);
        }, [headerInfo, items]);

        const calculateTotal = useCallback(() => items.reduce((s, i) => s + getAmount(i), 0), [items]);

        const removeItem = (id) => {
            if (items.length === 1) { alert('至少須保留一筆品項。'); return; }
            if (window.confirm('確定要刪除這筆品項嗎？')) setItems(p => p.filter(i => i.id !== id));
        };

        const clearAll = () => {
            if (window.confirm('確定要清空所有資料、開立新報價單嗎？\n此操作無法復原。')) {
                setHeaderInfo({ ...DEFAULT_HEADER, date: new Date().toISOString().split('T')[0] });
                setItems([newItem()]);
                setQuoteNo('');
            }
        };

        const updateItem = (id, field, rawValue) => {
            const value = ['qty','totalW','tareW','price'].includes(field) ? sanitizeNumber(rawValue) : rawValue;
            setItems(p => p.map(i => i.id === id ? { ...i, [field]: value } : i));
        };

        const handlePreview = () => {
            if (!headerInfo.clientName.trim()) { alert('請填寫客戶名稱後再完成報價。'); return; }
            if (!headerInfo.accountStatus)     { alert('請選擇帳務狀態後再完成報價。'); return; }
            if (calculateTotal() === 0 && !window.confirm('目前總金額為 $0，確定繼續？')) return;
            setQuoteNo(getNextQuoteNo(headerInfo.date));
            setMode('preview');
        };

        const syncToSheet = () => {
            if (!GAS_URL || GAS_URL.includes('請貼上')) {
                alert('❌ 請先在程式碼的 GAS_URL 變數填入你的 Google Apps Script 部署網址！');
                return;
            }
            if (!headerInfo.accountStatus) { alert('請選擇帳務狀態後再同步。'); return; }
            setSyncStatus('syncing');
            setSyncMsg('正在連線至 Google 試算表...');
            const useNo = quoteNo || peekQuoteNo(headerInfo.date);
            const payload = {
                date:          headerInfo.date,
                quoteNo:       useNo,
                client:        headerInfo.clientName,
                phone:         headerInfo.clientPhone,
                address:       headerInfo.clientAddress,
                accountStatus: headerInfo.accountStatus,
                total:         calculateTotal(),
                note:          headerInfo.footerNote,
                items: items.map(i => ({
                    name: i.name, qty: i.qty,
                    totalW: i.totalW, tareW: i.tareW,
                    net: getNetW(i), price: i.price,
                    subtotal: getAmount(i), itemNote: i.note
                }))
            };
            const cbName = 'gasCallback_' + Date.now();
            const script = document.createElement('script');
            let done = false;
            const timeout = setTimeout(() => {
                if (done) return; done = true;
                delete window[cbName]; document.body.removeChild(script);
                setSyncStatus('error');
                setSyncMsg('⏱ 連線逾時，請確認網路或 GAS 網址是否正確。');
            }, 15000);
            window[cbName] = (result) => {
                if (done) return; done = true;
                clearTimeout(timeout);
                delete window[cbName]; document.body.removeChild(script);
                if (result && result.status === 'ok') {
                    setSyncStatus('success');
                    setSyncMsg(`✅ 成功寫入！工作表：${result.sheet || headerInfo.date}`);
                } else {
                    setSyncStatus('error');
                    setSyncMsg('❌ 寫入失敗：' + (result?.message || '未知錯誤'));
                }
            };
            script.src = `${GAS_URL}?callback=${cbName}&data=${encodeURIComponent(JSON.stringify(payload))}`;
            document.body.appendChild(script);
        };

        const syncBtnClass = {
            idle:    'border-gray-100 hover:bg-gray-50 text-gray-600',
            syncing: 'border-blue-200 text-blue-400 cursor-not-allowed',
            success: 'border-green-300 text-green-600 bg-green-50',
            error:   'border-red-300 text-red-500 bg-red-50',
        }[syncStatus];

        // ════════════════════════════════════════
        //  編輯畫面
        // ════════════════════════════════════════
        const renderEdit = () => (
            <div className="max-w-2xl mx-auto p-4 pb-44">
                {/* 標題 */}
                <div className="text-center mb-8 pt-4">
                    <h1 className="text-2xl font-black text-brand tracking-wider">雷達牧場雞肉批發報價系統</h1>
                    <p className="text-gray-400 text-xs font-bold mt-1 uppercase">Professional Edition V16 — Google Sheets 串聯版</p>
                </div>

                {/* 同步狀態提示 */}
                {syncStatus !== 'idle' && (
                    <div className={`mb-4 px-4 py-3 rounded-2xl text-sm font-bold flex items-center gap-2 ${
                        syncStatus === 'success' ? 'bg-green-50 text-green-700 border border-green-200' :
                        syncStatus === 'error'   ? 'bg-red-50 text-red-600 border border-red-200' :
                                                   'bg-blue-50 text-blue-600 border border-blue-200'
                    }`}>
                        {syncStatus === 'syncing' && <span className="inline-block animate-spin">↻</span>}
                        {syncStatus === 'success' && <IconCheck />}
                        {syncMsg}
                        {syncStatus !== 'syncing' && (
                            <button onClick={() => setSyncStatus('idle')} className="ml-auto opacity-50 hover:opacity-100"><IconClose /></button>
                        )}
                    </div>
                )}

                {/* ══ 基本資訊：順序 = 客戶名稱 / 客戶電話 / 客戶地址 / 出貨日期 ══ */}
                <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-6">

                    {/* 第一行：客戶名稱 + 客戶電話（各半） */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="text-sm font-black text-black block mb-1">客戶名稱 <span className="text-red-400">*</span></label>
                            <input value={headerInfo.clientName}
                                onChange={e => setHeaderInfo({...headerInfo, clientName: e.target.value})}
                                className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-green-500 font-bold"
                                placeholder="請輸入姓名" />
                        </div>
                        <div>
                            <label className="text-sm font-black text-black block mb-1">客戶電話</label>
                            <input value={headerInfo.clientPhone}
                                onChange={e => setHeaderInfo({...headerInfo, clientPhone: e.target.value})}
                                inputMode="tel"
                                className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-green-500 font-bold"
                                placeholder="請輸入電話" />
                        </div>
                    </div>

                    {/* 第二行：客戶地址（全寬） */}
                    <div className="mb-4">
                        <label className="text-sm font-black text-black block mb-1">客戶地址</label>
                        <input value={headerInfo.clientAddress}
                            onChange={e => setHeaderInfo({...headerInfo, clientAddress: e.target.value})}
                            className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-green-500 font-bold"
                            placeholder="請輸入送貨地址" />
                    </div>

                    {/* ── 一.(1) 第三行：出貨日期（在客戶地址下方）── */}
                    <div>
                        <label className="text-sm font-black text-black block mb-1">出貨日期</label>
                        <input type="date" value={headerInfo.date}
                            onChange={e => setHeaderInfo({...headerInfo, date: e.target.value})}
                            className="w-full p-3 bg-gray-50 rounded-xl outline-none font-bold" />
                    </div>
                </div>

                {/* 品項列表 */}
                <div className="space-y-4">
                    {items.map((item) => (
                        <div key={item.id} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 relative transition-all hover:border-green-200">
                            <button onClick={() => removeItem(item.id)} className="absolute -right-2 -top-2 bg-white rounded-full p-1 text-gray-300 hover:text-red-500 shadow border" title="刪除">
                                <IconClose />
                            </button>
                            <div className="mb-4">
                                <ProductInput value={item.name} onChange={v => updateItem(item.id, 'name', v)} />
                            </div>
                            <div className="grid grid-cols-4 gap-2">
                                {[
                                    { field:'qty',    label:'數量/籠', cls:'bg-gray-50 border-gray-100',   tcls:'text-gray-800' },
                                    { field:'totalW', label:'總重/斤', cls:'bg-gray-50 border-gray-100',   tcls:'text-gray-800' },
                                    { field:'tareW',  label:'空重/斤', cls:'bg-gray-50 border-gray-100',   tcls:'text-gray-600' },
                                    { field:'price',  label:'單價/元', cls:'bg-green-50 border-green-100', tcls:'text-brand font-black text-xl' },
                                ].map(({ field, label, cls, tcls }) => (
                                    <div key={field} className={`${cls} p-2 rounded-xl border`}>
                                        <label className="text-xs font-black text-black block text-center mb-1">{label}</label>
                                        <input type="text" inputMode="decimal" value={item[field]}
                                            onChange={e => updateItem(item.id, field, e.target.value)}
                                            placeholder="0"
                                            className={`w-full text-center bg-transparent font-black text-lg ${tcls}`} />
                                    </div>
                                ))}
                            </div>
                            <div className="mt-4">
                                <input value={item.note}
                                    onChange={e => updateItem(item.id, 'note', e.target.value)}
                                    className="w-full text-sm text-gray-500 bg-gray-50/80 p-2 rounded-xl italic outline-none border border-transparent focus:border-gray-200"
                                    placeholder="項目備註（如：一籠需放置幾隻雞）" />
                            </div>
                            <div className="mt-4 flex justify-between items-center pt-3 border-t border-dashed border-gray-200">
                                <span className="text-sm font-bold text-black">淨重：<b className="text-xl text-black font-black">{getNetW(item)} 斤</b></span>
                                <span className="text-brand font-black text-2xl">${getAmount(item).toLocaleString()}</span>
                            </div>
                        </div>
                    ))}
                </div>

                {/* 新增品項 */}
                <button onClick={() => setItems(p => [...p, newItem()])}
                    className="w-full py-4 mt-8 border-2 border-dashed border-black/20 rounded-3xl text-black font-black hover:bg-white hover:border-brand hover:text-brand transition-all flex items-center justify-center gap-2">
                    <IconPlus /> 新增品項
                </button>

                {/* 備註 / 條款 */}
                <div className="mt-10 bg-white p-5 rounded-3xl border border-gray-100">
                    <label className="text-sm font-black text-black block mb-2 px-1">備註 / 條款</label>
                    <textarea value={headerInfo.footerNote}
                        onChange={e => setHeaderInfo({...headerInfo, footerNote: e.target.value})}
                        rows="3"
                        className="w-full p-4 bg-gray-50 rounded-2xl text-sm outline-none font-medium text-gray-700" />
                </div>

                {/* 帳務狀態（必填） */}
                <div className="mt-4 bg-white p-5 rounded-3xl border border-gray-100">
                    <label className="text-sm font-black text-black block mb-3 px-1">
                        帳務狀態 <span className="text-red-400">*</span>
                        {!headerInfo.accountStatus && <span className="ml-2 text-red-400 text-xs font-bold">（必填）</span>}
                    </label>
                    <div className="flex gap-4">
                        <label className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-2xl border-2 cursor-pointer transition font-black text-base
                            ${headerInfo.accountStatus === 'settled' ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-200 bg-gray-50 text-gray-600'}`}>
                            <input type="radio" name="accountStatus" value="settled"
                                checked={headerInfo.accountStatus === 'settled'}
                                onChange={() => setHeaderInfo({...headerInfo, accountStatus: 'settled'})}
                                className="accent-green-600 w-4 h-4" />
                            款項已結清
                        </label>
                        <label className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-2xl border-2 cursor-pointer transition font-black text-base
                            ${headerInfo.accountStatus === 'pending' ? 'border-orange-400 bg-orange-50 text-orange-700' : 'border-gray-200 bg-gray-50 text-gray-600'}`}>
                            <input type="radio" name="accountStatus" value="pending"
                                checked={headerInfo.accountStatus === 'pending'}
                                onChange={() => setHeaderInfo({...headerInfo, accountStatus: 'pending'})}
                                className="accent-orange-500 w-4 h-4" />
                            款項未結清
                        </label>
                    </div>
                </div>

                {/* 清空 */}
                <button onClick={clearAll} className="w-full py-3 mt-4 border border-red-200 rounded-2xl text-red-400 text-sm font-bold hover:bg-red-50 transition-all flex items-center justify-center gap-2">
                    <IconTrash /> 清空全部，開立新報價單
                </button>

                {/* 底部固定列 */}
                <div className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t-2 border-gray-100 p-4 z-50 shadow-2xl">
                    <div className="max-w-2xl mx-auto">
                        <div className="flex items-center justify-between mb-2">
                            <div>
                                <span className="text-xs font-black text-gray-400 block mb-0.5">總計金額</span>
                                <span className="text-4xl font-black text-black tracking-tighter">${calculateTotal().toLocaleString()}</span>
                            </div>
                            <div className="flex gap-3 items-center">
                                <button onClick={syncToSheet} disabled={syncStatus === 'syncing'}
                                    title="同步至 Google 試算表"
                                    className={`flex items-center gap-2 px-4 py-3 rounded-2xl border-2 font-bold text-sm transition ${syncBtnClass}`}>
                                    <span className={syncStatus === 'syncing' ? 'animate-spin inline-block' : 'inline-block'}><IconSync /></span>
                                    {syncStatus === 'syncing' ? '同步中...' : syncStatus === 'success' ? '已同步' : '同步試算表'}
                                </button>
                                <button onClick={handlePreview}
                                    className="bg-brand text-white px-8 py-3 rounded-2xl font-black text-lg shadow-xl shadow-green-900/20 hover:scale-105 transition active:scale-95">
                                    完成報價
                                </button>
                            </div>
                        </div>
                        <p className="text-xs text-gray-400 text-right">點擊「同步試算表」可將此筆報價寫入 Google Sheets</p>
                    </div>
                </div>
            </div>
        );

        // ════════════════════════════════════════
        //  預覽 / 列印畫面
        // ════════════════════════════════════════
        const renderPreview = () => {
            const acctSettled = headerInfo.accountStatus === 'settled';
            return (
                <div className="min-h-screen bg-gray-800 pb-10">
                    <div className="no-print p-4 flex justify-between max-w-[210mm] mx-auto text-white">
                        <button onClick={() => setMode('edit')} className="font-bold opacity-70 hover:opacity-100">← 返回編輯畫面</button>
                        <button onClick={() => window.print()} className="bg-brand px-8 py-2 rounded-full font-black">列印 / 存為 PDF</button>
                    </div>

                    <div className="print-container w-[210mm] min-h-[297mm] mx-auto bg-white p-[13mm] relative serif shadow-2xl">

                        {/* 右上角單號 */}
                        <div className="absolute top-[13mm] right-[13mm] text-right">
                            <span className="text-xs font-black text-gray-500 font-sans tracking-wider">單號：</span>
                            <span className="text-sm font-black text-brand font-sans">{quoteNo}</span>
                        </div>

                        {/* 標題區 */}
                        <div className="text-center border-b-4 border-brand pb-6 mb-6 pt-0">
                            <h1 className="text-5xl font-black text-brand tracking-[0.2em] mb-1">{headerInfo.companyName}</h1>
                            <p className="text-sm font-bold tracking-[0.5em] text-gray-500 uppercase mb-0">雞肉批發報價單</p>
                            <div className="mt-6 flex justify-between items-start px-1">
                                <div className="text-left space-y-2">
                                    <p className="text-base font-black">
                                        客戶名稱：<span className="font-black border-b-2 border-black px-3 text-lg">{headerInfo.clientName || '—'}</span>
                                    </p>
                                    <p className="text-base font-black">
                                        客戶電話：<span className="font-black border-b-2 border-black px-3 text-lg">{headerInfo.clientPhone || '—'}</span>
                                    </p>
                                    {headerInfo.clientAddress && (
                                        <p className="text-base font-black">
                                            客戶地址：<span className="font-black border-b-2 border-black px-3 text-base">{headerInfo.clientAddress}</span>
                                        </p>
                                    )}
                                </div>
                                <div className="text-right">
                                    <p className="text-base font-black text-black font-sans">
                                        出貨日期：<span className="text-lg font-black text-black">{headerInfo.date}</span>
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* 品項表格 */}
                        <table className="w-full border-collapse border-2 border-black mb-5 text-sm" style={{tableLayout:'fixed'}}>
                            <colgroup>
                                <col className="col-seq"/><col className="col-name"/>
                                <col className="col-qty"/><col className="col-totalw"/>
                                <col className="col-tarew"/><col className="col-net"/>
                                <col className="col-price"/><col className="col-sub"/>
                            </colgroup>
                            <thead>
                                <tr className="bg-gray-100">
                                    <th className="border-2 border-black p-2 text-center">序次</th>
                                    <th className="border-2 border-black p-2 text-left">品項名稱</th>
                                    <th className="border-2 border-black p-2 text-center">數量/籠</th>
                                    <th className="border-2 border-black p-2 text-center">總重/斤</th>
                                    <th className="border-2 border-black p-2 text-center">空重/斤</th>
                                    <th className="border-2 border-black p-2 text-center text-brand">淨重/斤</th>
                                    <th className="border-2 border-black p-2 text-center">單價/元</th>
                                    <th className="border-2 border-black p-2 text-center font-black">合計/元</th>
                                </tr>
                            </thead>
                            <tbody>
                                {items.map((item, idx) => (
                                    <tr key={item.id}>
                                        <td className="border border-black p-2 text-center font-bold">{idx + 1}</td>
                                        <td className="border border-black p-2 text-left">
                                            <div className="font-black text-base">{item.name || '---'}</div>
                                            {item.note && <div className="text-xs text-gray-500 italic mt-1 font-sans">※ {item.note}</div>}
                                        </td>
                                        <td className="border border-black p-2 text-center font-bold">{item.qty || '—'}</td>
                                        <td className="border border-black p-2 text-center font-bold">{item.totalW || '—'}</td>
                                        <td className="border border-black p-2 text-center font-bold">{item.tareW || '—'}</td>
                                        <td className="border border-black p-2 text-center font-black text-base text-brand">{getNetW(item)}</td>
                                        <td className="border border-black p-2 text-center font-black text-base">{item.price || '—'}</td>
                                        <td className="border border-black p-2 text-right font-black text-base">${getAmount(item).toLocaleString()}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>

                        {/* 總計金額 */}
                        <div className="flex justify-end mb-6">
                            <div className="total-box">
                                <span className="text-base font-black block mb-1 font-sans text-black tracking-wider">總計金額 / 元</span>
                                <span className="text-5xl font-black tracking-tighter text-black">${calculateTotal().toLocaleString()}</span>
                            </div>
                        </div>

                        {/* 備註 / 條款 */}
                        <div className="border-2 border-black p-4 text-sm min-h-[72px] mb-4">
                            <p className="font-black mb-2 underline italic">備註 / 條款：</p>
                            <div className="whitespace-pre-wrap leading-relaxed font-sans">{headerInfo.footerNote}</div>
                        </div>

                        {/* 帳務狀態框 */}
                        <div className="border-2 border-black mb-4 overflow-hidden" style={{display:'flex'}}>
                            <div className="account-sidebar">帳務狀態</div>
                            <div className="flex flex-col flex-1">
                                <div className="flex items-center gap-3 px-5 py-3">
                                    <span className="text-lg font-black" style={{minWidth:'1.2em',textAlign:'center'}}>
                                        {acctSettled ? '☑' : '☐'}
                                    </span>
                                    <span className={`text-base font-black ${acctSettled ? 'text-black' : 'text-gray-400'}`}>款項已結清</span>
                                </div>
                                <div style={{borderTop:'1px solid #d1d5db',margin:'0 16px'}}></div>
                                <div className="flex items-center gap-3 px-5 py-3">
                                    <span className="text-lg font-black" style={{minWidth:'1.2em',textAlign:'center'}}>
                                        {!acctSettled ? '☑' : '☐'}
                                    </span>
                                    <span className={`text-base font-black ${!acctSettled ? 'text-black' : 'text-gray-400'}`}>款項未結清</span>
                                </div>
                            </div>
                        </div>

                        {/* 簽名欄 */}
                        <div className="flex justify-between px-8" style={{marginTop:'30mm'}}>
                            <div className="w-2/5 border-t-2 border-black pt-3 text-center text-sm font-black">客戶簽章</div>
                            <div className="w-2/5 border-t-2 border-black pt-3 text-center text-sm font-black">{headerInfo.companyName} 簽章</div>
                        </div>
                    </div>
                </div>
            );
        };

        return mode === 'edit' ? renderEdit() : renderPreview();
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
